<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI PvP/PvE/Co-op - Defender vs Boss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; }
        canvas { background: linear-gradient(to bottom, #1e1b4b, #311042); border: 2px solid #4f46e5; box-shadow: 0 0 25px rgba(79, 70, 229, 0.4); }
        .ctrl-btn { background: rgba(30, 41, 59, 0.8); border: 1px solid #475569; border-radius: 8px; color: #cbd5e1; font-weight: bold; font-size: 11px; padding: 8px 4px; text-align: center; cursor: pointer; transition: 0.1s; }
        .ctrl-btn:active, .ctrl-btn.active { transform: scale(0.95); }
        
        .p1-btn:active, .p1-btn.active { background: #10b981; border-color: #34d399; color: white;}
        .p2-btn:active, .p2-btn.active { background: #3b82f6; border-color: #60a5fa; color: white;}
        .boss-btn:active, .boss-btn.active { background: #e11d48; border-color: #fb7185; color: white;}
        
        .organ-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; cursor: pointer; }
        .organ-btn:hover { background: #334155; border-color: #64748b; }
        .organ-btn.selected { border-color: #38bdf8; background: #0c4a6e; }

        .mode-btn { padding: 8px; border-radius: 8px; font-weight: bold; font-size: 12px; transition: 0.2s; border: 1px solid transparent; }
        .mode-btn.active { box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-4 gap-6">
        <div class="col-span-1 space-y-4 bg-slate-900/90 p-5 rounded-2xl border border-slate-800 shadow-2xl flex flex-col">
            <div>
                <span class="text-[10px] font-bold uppercase tracking-wider text-cyan-400 bg-cyan-950 px-2 py-1 rounded">Medical Sandbox</span>
                <h1 class="text-xl font-black text-white mt-2">Bảo Vệ Cơ Thể</h1>
            </div>

            <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                <h3 class="text-[10px] font-bold text-slate-400 mb-2 text-center uppercase">Chế độ chơi</h3>
                <div class="flex flex-col gap-2">
                    <button id="mode-pve" onclick="setGameMode('pve')" class="mode-btn bg-indigo-600 hover:bg-indigo-500 text-white">👤 PvE (1 người vs AI)</button>
                    <button id="mode-coop" onclick="setGameMode('coop')" class="mode-btn bg-sky-600 hover:bg-sky-500 text-white">👥 Co-op (2 người vs AI)</button>
                    <button id="mode-pvp" onclick="setGameMode('pvp')" class="mode-btn bg-rose-600 hover:bg-rose-500 text-white">⚔️ PvP (Người vs Người)</button>
                </div>
            </div>

            <h3 class="text-xs font-bold text-slate-400 mt-2 border-b border-slate-700 pb-1">CHỌN HỆ CƠ QUAN:</h3>
            <div class="grid grid-cols-2 gap-2 flex-1">
                <button id="btn-brain" class="organ-btn selected" onclick="selectOrgan('brain')">
                    <span class="text-2xl mb-1">🧠</span><span class="text-[10px] font-bold text-slate-300 text-center">Hệ thần kinh<br>(Não)</span>
                </button>
                <button id="btn-lungs" class="organ-btn" onclick="selectOrgan('lungs')">
                    <span class="text-2xl mb-1">🫁</span><span class="text-[10px] font-bold text-slate-300 text-center">Hệ hô hấp<br>(Phổi)</span>
                </button>
                <button id="btn-heart" class="organ-btn" onclick="selectOrgan('heart')">
                    <span class="text-2xl mb-1">🫀</span><span class="text-[10px] font-bold text-slate-300 text-center">Hệ tuần hoàn<br>(Tim)</span>
                </button>
                <button id="btn-kidneys" class="organ-btn" onclick="selectOrgan('kidneys')">
                    <span class="text-2xl mb-1">💧</span><span class="text-[10px] font-bold text-slate-300 text-center">Hệ tiết niệu<br>(Thận)</span>
                </button>
                <button id="btn-stomach" class="organ-btn" onclick="selectOrgan('stomach')">
                    <span class="text-2xl mb-1">🥩</span><span class="text-[10px] font-bold text-slate-300 text-center">Hệ tiêu hóa<br>(Bao tử)</span>
                </button>
                <button id="btn-liver" class="organ-btn" onclick="selectOrgan('liver')">
                    <span class="text-2xl mb-1">🧫</span><span class="text-[10px] font-bold text-slate-300 text-center">Hệ gan mật<br>(Gan)</span>
                </button>
            </div>
        </div>

        <div class="col-span-3 flex flex-col">
            <div class="bg-slate-950 p-2 rounded-t-xl border-t border-x border-slate-800 flex justify-between items-center px-4">
                <div class="flex gap-4">
                    <div class="text-emerald-400 font-bold text-sm">🛡️ P1 HP: <span id="p1-hp">10</span></div>
                    <div id="p2-hp-container" class="text-sky-400 font-bold text-sm hidden">🛡️ P2 HP: <span id="p2-hp">10</span></div>
                </div>
                <div class="text-amber-400 font-bold text-sm">⏱️ <span id="time-display">0.0</span>s</div>
                <div class="text-rose-400 font-bold text-sm">🦠 BOSS HP: <span id="boss-hp">10</span></div>
            </div>
            
            <canvas id="gameCanvas" width="800" height="420" class="w-full object-cover"></canvas>

            <div class="bg-slate-900 border-b border-x border-slate-800 rounded-b-xl p-3 flex justify-between items-center shadow-xl">
                
                <div class="flex flex-col items-center w-1/2 border-r border-slate-700 pr-2">
                    <span class="text-[11px] font-bold text-emerald-400 mb-2">P1 (Bảo Vệ) - Phím: W A S D E</span>
                    <div class="grid grid-cols-4 gap-1.5 w-full max-w-[300px]">
                        <div class="col-span-4 flex justify-center mb-1">
                            <button class="ctrl-btn p1-btn w-1/3" onmousedown="setKey('w', true)" onmouseup="setKey('w', false)" ontouchstart="setKey('w', true)" ontouchend="setKey('w', false)">W Nhảy</button>
                        </div>
                        <button class="ctrl-btn p1-btn" onmousedown="setKey('a', true)" onmouseup="setKey('a', false)" ontouchstart="setKey('a', true)" ontouchend="setKey('a', false)">A Trái</button>
                        <button class="ctrl-btn p1-btn border-emerald-500 text-emerald-300" onmousedown="setKey('s', true)" onmouseup="setKey('s', false)" ontouchstart="setKey('s', true)" ontouchend="setKey('s', false)">S Khiên</button>
                        <button class="ctrl-btn p1-btn" onmousedown="setKey('d', true)" onmouseup="setKey('d', false)" ontouchstart="setKey('d', true)" ontouchend="setKey('d', false)">D Phải</button>
                        <button class="ctrl-btn p1-btn bg-emerald-900/50" onmousedown="setKey('e', true)" onmouseup="setKey('e', false)" ontouchstart="setKey('e', true)" ontouchend="setKey('e', false)">E Bắn</button>
                    </div>
                </div>

                <div class="flex flex-col items-center w-1/2 pl-2" id="p2-panel">
                    <span class="text-[11px] font-bold text-rose-400 mb-2" id="p2-control-label">P2 (Boss) - Phím: Mũi tên (↑ ↓ ← →)</span>
                    <div class="grid grid-cols-4 gap-1.5 w-full max-w-[300px]" id="p2-controls">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // GAME STATE
        let gameMode = 'pve'; 
        let gameState = 'playing'; 
        let startTime = 0;
        let elapsedTime = 0;
        
        let envTheme = { name: "Hệ thần kinh", bg: "rgba(25, 10, 40, 0.7)", wall: "#4c1d95", border: "#8b5cf6", organColor: "#f472b6" };
        
        // ENTITIES
        let p1 = { x: 50, y: 200, width: 24, height: 24, vx: 0, vy: 0, hp: 10, isGrounded: false, color: '#10b981', shieldActive: false };
        let p2 = { x: 100, y: 200, width: 24, height: 24, vx: 0, vy: 0, hp: 10, isGrounded: false, color: '#38bdf8', shieldActive: false, active: false };
        let boss = { x: 650, y: 150, radius: 25, vx: 0, vy: 2.5, hp: 10, maxHp: 10, dirY: 1, color: '#e11d48', shieldActive: false };
        let organBase = { x: 10, y: 120, w: 30, h: 140 }; 
        
        let projectiles = []; 
        let platforms = [];
        let mapViruses = []; 
        let mapHeals = [];   
        let particles = [];
        
        const GRAVITY = 0.4;
        const JUMP = -9; // Tăng lực nhảy lên một chút cho mượt

        // BẮT SỰ KIỆN PHÍM BẤM (HỖ TRỢ TOUCH CHO MOBILE/IPAD)
        let keys = {};
        window.addEventListener('keydown', e => { 
            keys[e.key] = true; keys[e.key.toLowerCase()] = true; 
            if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault(); 
        });
        window.addEventListener('keyup', e => { 
            keys[e.key] = false; keys[e.key.toLowerCase()] = false; 
        });
        function setKey(k, val) { keys[k] = val; keys[k.toLowerCase()] = val; }

        function setGameMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active', 'border-white');
                btn.style.opacity = '0.5';
            });
            const activeBtn = document.getElementById('mode-' + mode);
            activeBtn.classList.add('active', 'border-white');
            activeBtn.style.opacity = '1';

            const p2Label = document.getElementById('p2-control-label');
            const p2Controls = document.getElementById('p2-controls');
            const p2HpUi = document.getElementById('p2-hp-container');

            if (mode === 'pve') {
                p2.active = false;
                p2HpUi.classList.add('hidden');
                p2Label.className = "text-[11px] font-bold text-slate-500 mb-2";
                p2Label.innerText = "BOSS ĐANG ĐƯỢC AI ĐIỀU KHIỂN (PvE)";
                p2Controls.innerHTML = `<div class="col-span-4 text-center text-xs text-slate-500 py-4">Hệ thống đang tự động điều khiển Boss.</div>`;
            } else if (mode === 'coop') {
                p2.active = true;
                p2HpUi.classList.remove('hidden');
                p2Label.className = "text-[11px] font-bold text-sky-400 mb-2";
                p2Label.innerText = "P2 (Bảo Vệ Cùng) - Phím: ↑ ↓ ← → Space";
                p2Controls.innerHTML = `
                    <div class="col-span-4 flex justify-center mb-1">
                        <button class="ctrl-btn p2-btn w-1/3" onmousedown="setKey('ArrowUp', true)" onmouseup="setKey('ArrowUp', false)" ontouchstart="setKey('ArrowUp', true)" ontouchend="setKey('ArrowUp', false)">↑ Nhảy</button>
                    </div>
                    <button class="ctrl-btn p2-btn" onmousedown="setKey('ArrowLeft', true)" onmouseup="setKey('ArrowLeft', false)" ontouchstart="setKey('ArrowLeft', true)" ontouchend="setKey('ArrowLeft', false)">← Trái</button>
                    <button class="ctrl-btn p2-btn border-sky-500 text-sky-300" onmousedown="setKey('ArrowDown', true)" onmouseup="setKey('ArrowDown', false)" ontouchstart="setKey('ArrowDown', true)" ontouchend="setKey('ArrowDown', false)">↓ Khiên</button>
                    <button class="ctrl-btn p2-btn" onmousedown="setKey('ArrowRight', true)" onmouseup="setKey('ArrowRight', false)" ontouchstart="setKey('ArrowRight', true)" ontouchend="setKey('ArrowRight', false)">→ Phải</button>
                    <button class="ctrl-btn p2-btn bg-sky-900/50" onmousedown="setKey(' ', true)" onmouseup="setKey(' ', false)" ontouchstart="setKey(' ', true)" ontouchend="setKey(' ', false)">Space Bắn</button>
                `;
            } else if (mode === 'pvp') {
                p2.active = false;
                p2HpUi.classList.add('hidden');
                p2Label.className = "text-[11px] font-bold text-rose-400 mb-2";
                p2Label.innerText = "P2 (Boss) - Phím: ↑ ↓ ← →";
                p2Controls.innerHTML = `
                    <div class="col-span-4 flex justify-center mb-1">
                        <button class="ctrl-btn boss-btn w-1/3 bg-rose-900/50" onmousedown="setKey('ArrowUp', true)" onmouseup="setKey('ArrowUp', false)" ontouchstart="setKey('ArrowUp', true)" ontouchend="setKey('ArrowUp', false)">↑ Bắn Virus</button>
                    </div>
                    <button class="ctrl-btn boss-btn" onmousedown="setKey('ArrowLeft', true)" onmouseup="setKey('ArrowLeft', false)" ontouchstart="setKey('ArrowLeft', true)" ontouchend="setKey('ArrowLeft', false)">← Trái</button>
                    <button class="ctrl-btn boss-btn border-amber-500 text-amber-300" onmousedown="setKey('ArrowDown', true)" onmouseup="setKey('ArrowDown', false)" ontouchstart="setKey('ArrowDown', true)" ontouchend="setKey('ArrowDown', false)">↓ Khiên</button>
                    <button class="ctrl-btn boss-btn" onmousedown="setKey('ArrowRight', true)" onmouseup="setKey('ArrowRight', false)" ontouchstart="setKey('ArrowRight', true)" ontouchend="setKey('ArrowRight', false)">→ Phải</button>
                    <div></div>
                `;
            }
            resetGame();
        }

        function selectOrgan(type) {
            document.querySelectorAll('.organ-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btn-' + type).classList.add('selected');

            if(type === 'brain') {
                envTheme = { name: "Hệ thần kinh", bg: "rgba(25, 10, 40, 0.7)", wall: "#4c1d95", border: "#8b5cf6", organColor: "#f472b6" };
                platforms = [{x: 120, y: 310, w: 100, h: 12, label: "Khe Synapse"}, {x: 300, y: 240, w: 150, h: 12, label: "Sợi trục"}, {x: 480, y: 160, w: 120, h: 12, label: "Tế bào đệm"}];
            } else if(type === 'lungs') {
                envTheme = { name: "Hệ hô hấp", bg: "rgba(10, 30, 50, 0.7)", wall: "#0c4a6e", border: "#38bdf8", organColor: "#7dd3fc" };
                platforms = [{x: 120, y: 300, w: 120, h: 12, label: "Màng phổi"}, {x: 280, y: 220, w: 150, h: 12, label: "Cuống phổi"}, {x: 480, y: 140, w: 100, h: 12, label: "Phế nang"}];
            } else if(type === 'heart') {
                envTheme = { name: "Hệ tuần hoàn", bg: "rgba(40, 10, 15, 0.7)", wall: "#7f1d1d", border: "#ef4444", organColor: "#fb7185" };
                platforms = [{x: 150, y: 290, w: 120, h: 12, label: "Hồng cầu"}, {x: 350, y: 210, w: 140, h: 12, label: "Tiểu cầu"}, {x: 520, y: 130, w: 100, h: 12, label: "Bạch cầu"}];
            } else if(type === 'kidneys') {
                envTheme = { name: "Hệ tiết niệu", bg: "rgba(20, 20, 50, 0.7)", wall: "#1e3a8a", border: "#34d399", organColor: "#6ee7b7" };
                platforms = [{x: 120, y: 280, w: 110, h: 12, label: "Bể thận"}, {x: 290, y: 210, w: 130, h: 12, label: "Cầu thận"}, {x: 460, y: 150, w: 120, h: 12, label: "Ống thận"}];
            } else if(type === 'stomach') {
                envTheme = { name: "Hệ tiêu hóa", bg: "rgba(6, 24, 15, 0.7)", wall: "#064e3b", border: "#10b981", organColor: "#fde047" };
                platforms = [{x: 130, y: 300, w: 120, h: 12, label: "Dịch vị"}, {x: 300, y: 230, w: 140, h: 12, label: "Nhung mao"}, {x: 480, y: 160, w: 110, h: 12, label: "Lớp nhầy"}, {x: 250, y: 120, w: 130, h: 12, label: "Enzyme phân giải"}];
            } else if(type === 'liver') {
                envTheme = { name: "Hệ gan mật", bg: "rgba(30, 20, 10, 0.7)", wall: "#78350f", border: "#fbbf24", organColor: "#d97706" };
                platforms = [{x: 140, y: 310, w: 130, h: 12, label: "Nhu mô gan"}, {x: 330, y: 220, w: 120, h: 12, label: "Ống mật"}, {x: 500, y: 140, w: 120, h: 12, label: "Tĩnh mạch"}];
            }
            resetGame();
        }

        function resetGame() {
            gameState = 'playing';
            startTime = Date.now(); elapsedTime = 0;
            p1.hp = 10; p2.hp = 10; boss.hp = 10;
            p1.x = 50; p1.y = 200; p1.vy = 0;
            p2.x = 100; p2.y = 200; p2.vy = 0;
            boss.x = 650; boss.y = 150;
            
            projectiles = []; mapViruses = []; mapHeals = []; particles = [];

            for(let i=0; i<4; i++) mapViruses.push({ x: 200 + Math.random()*400, y: 50 + Math.random()*250, r: 8, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 });
            for(let i=0; i<3; i++) mapHeals.push({ x: 200 + Math.random()*400, y: 50 + Math.random()*250, r: 7, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 });
            for(let i=0; i<25; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, vy: Math.random()*0.5 });
            updateUI();
        }

        let p1LastShot = 0; let p2LastShot = 0; let bossLastShot = 0;

        // VÁ LỖI KHÔNG NHẢY ĐƯỢC: RESET LẠI ISGROUNDED TRƯỚC KHI TÍNH VA CHẠM
        function applyPhysics(player, controls) {
            if (keys[controls.left]) player.vx = -4.5;
            else if (keys[controls.right]) player.vx = 4.5;
            else player.vx = 0;

            if (keys[controls.jump] && player.isGrounded) { 
                player.vy = JUMP; 
                player.isGrounded = false; 
            }
            player.shieldActive = !!keys[controls.shield];

            player.vy += GRAVITY; 
            player.x += player.vx; 
            player.y += player.vy;
            
            // Giới hạn biên màn hình
            if (player.x < organBase.x + organBase.w) player.x = organBase.x + organBase.w;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            
            // Va chạm Trần nhà
            if (player.y <= 30) { 
                player.y = 30; 
                player.vy = 0; 
            }
            
            // RESET MẶT ĐẤT
            player.isGrounded = false;

            // Va chạm Sàn nhà
            if (player.y + player.height >= canvas.height - 30) { 
                player.y = canvas.height - 30 - player.height; 
                player.vy = 0; 
                player.isGrounded = true; 
            }

            // Va chạm Bậc thang
            platforms.forEach(plat => {
                if (player.x < plat.x + plat.w && player.x + player.width > plat.x && player.y + player.height > plat.y && player.y + player.height - player.vy <= plat.y + 14) {
                    player.y = plat.y - player.height; 
                    player.vy = 0; 
                    player.isGrounded = true;
                }
            });
        }

        function update() {
            if(gameState !== 'playing') return;

            elapsedTime = (Date.now() - startTime) / 1000;
            document.getElementById('time-display').innerText = elapsedTime.toFixed(1);

            // Xử lý P1
            if(p1.hp > 0) {
                applyPhysics(p1, { left: 'a', right: 'd', jump: 'w', shield: 's' });
                if (keys['e'] && Date.now() - p1LastShot > 350) { 
                    projectiles.push({ x: p1.x + p1.width, y: p1.y + p1.height/2, vx: 8, vy: 0, type: 'p1_proj', color: '#34d399', r: 5 });
                    p1LastShot = Date.now();
                }
            }

            // Xử lý P2
            if(p2.active && p2.hp > 0) {
                applyPhysics(p2, { left: 'arrowleft', right: 'arrowright', jump: 'arrowup', shield: 'arrowdown' });
                if (keys[' '] && Date.now() - p2LastShot > 350) { // Nút Space
                    projectiles.push({ x: p2.x + p2.width, y: p2.y + p2.height/2, vx: 8, vy: 0, type: 'p2_proj', color: '#7dd3fc', r: 5 });
                    p2LastShot = Date.now();
                }
            }

            // Xử lý Boss
            if(gameMode === 'pve' || gameMode === 'coop') {
                boss.y += boss.vy * boss.dirY;
                if (boss.y < 60 || boss.y > canvas.height - 60) boss.dirY *= -1;
                
                if (Date.now() - bossLastShot > (gameMode === 'coop' ? 800 : 1200) && Math.random() < 0.6) {
                    projectiles.push({ x: boss.x - boss.radius, y: boss.y, vx: -7, vy: 0, type: 'boss_proj', color: '#fb7185', r: 6 });
                    bossLastShot = Date.now();
                }

                boss.shieldActive = false;
                projectiles.forEach(p => {
                    if ((p.type === 'p1_proj' || p.type === 'p2_proj') && p.x > boss.x - 120 && p.y > boss.y - 40 && p.y < boss.y + 40) {
                        if (Math.random() < 0.4) boss.shieldActive = true;
                    }
                });
            } else if (gameMode === 'pvp') {
                boss.y += boss.vy * boss.dirY;
                if (boss.y < 60 || boss.y > canvas.height - 60) boss.dirY *= -1;

                if (keys['arrowleft']) boss.x -= 4;
                if (keys['arrowright']) boss.x += 4;
                if(boss.x < canvas.width/2) boss.x = canvas.width/2;
                if(boss.x > canvas.width - boss.radius) boss.x = canvas.width - boss.radius;

                boss.shieldActive = !!keys['arrowdown'];
                if (keys['arrowup'] && Date.now() - bossLastShot > 400) {
                    projectiles.push({ x: boss.x - boss.radius, y: boss.y, vx: -7, vy: 0, type: 'boss_proj', color: '#fb7185', r: 6 });
                    bossLastShot = Date.now();
                }
            }

            // Vật phẩm bay lơ lửng
            const handleFloaters = (arr, isVirus) => {
                for(let i = arr.length -1; i >= 0; i--) {
                    let m = arr[i]; m.x += m.vx; m.y += m.vy;
                    if(m.x < 100 || m.x > canvas.width-100) m.vx *= -1;
                    if(m.y < 50 || m.y > canvas.height-50) m.vy *= -1;

                    if(p1.hp > 0 && Math.hypot((p1.x + p1.width/2) - m.x, (p1.y + p1.height/2) - m.y) < m.r + 12) {
                        if(isVirus) p1.hp--; else if(p1.hp < 10) p1.hp++;
                        arr.splice(i, 1); checkWin(); updateUI(); continue;
                    }
                    if(p2.active && p2.hp > 0 && Math.hypot((p2.x + p2.width/2) - m.x, (p2.y + p2.height/2) - m.y) < m.r + 12) {
                        if(isVirus) p2.hp--; else if(p2.hp < 10) p2.hp++;
                        arr.splice(i, 1); checkWin(); updateUI(); continue;
                    }
                }
            };
            handleFloaters(mapViruses, true);
            handleFloaters(mapHeals, false);

            // Xử lý va chạm Đạn
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let proj = projectiles[i]; proj.x += proj.vx; proj.y += proj.vy;
                if (proj.x < 0 || proj.x > canvas.width) { projectiles.splice(i, 1); continue; }

                if (proj.type === 'boss_proj') {
                    if (p1.hp > 0 && p1.shieldActive && proj.x <= p1.x + p1.width + 10 && proj.x >= p1.x + p1.width && Math.abs(proj.y - (p1.y + p1.height/2)) < 25) { projectiles.splice(i, 1); continue; }
                    if (p2.active && p2.hp > 0 && p2.shieldActive && proj.x <= p2.x + p2.width + 10 && proj.x >= p2.x + p2.width && Math.abs(proj.y - (p2.y + p2.height/2)) < 25) { projectiles.splice(i, 1); continue; }
                    
                    if (p1.hp > 0 && proj.x < p1.x + p1.width && proj.x > p1.x && proj.y > p1.y && proj.y < p1.y + p1.height) { p1.hp--; updateUI(); projectiles.splice(i, 1); checkWin(); continue; }
                    if (p2.active && p2.hp > 0 && proj.x < p2.x + p2.width && proj.x > p2.x && proj.y > p2.y && proj.y < p2.y + p2.height) { p2.hp--; updateUI(); projectiles.splice(i, 1); checkWin(); continue; }
                    
                    if (proj.x <= organBase.x + organBase.w) {
                        p1.hp--; if(p2.active) p2.hp--; updateUI(); projectiles.splice(i, 1); checkWin(); continue;
                    }
                }

                if (proj.type === 'p1_proj' || proj.type === 'p2_proj') {
                    if (boss.shieldActive && proj.x >= boss.x - boss.radius - 12 && proj.x <= boss.x - boss.radius && Math.abs(proj.y - boss.y) < boss.radius + 10) { projectiles.splice(i, 1); continue; }
                    if (Math.hypot(proj.x - boss.x, proj.y - boss.y) < boss.radius + proj.r) {
                        boss.hp--; updateUI(); projectiles.splice(i, 1); checkWin(); continue;
                    }
                }
            }
            particles.forEach(p => { p.y += p.vy; if(p.y > canvas.height) p.y = 0; });
        }

        function checkWin() {
            let defendersDead = p2.active ? (p1.hp <= 0 && p2.hp <= 0) : (p1.hp <= 0);
            if (defendersDead && gameState === 'playing') gameState = 'lose';
            else if (boss.hp <= 0 && gameState === 'playing') gameState = 'win';
        }

        function updateUI() {
            document.getElementById('p1-hp').innerText = Math.max(0, p1.hp);
            if(p2.active) document.getElementById('p2-hp').innerText = Math.max(0, p2.hp);
            document.getElementById('boss-hp').innerText = Math.max(0, boss.hp);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = envTheme.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); });

            // Tường
            ctx.fillStyle = envTheme.wall; ctx.fillRect(0, 0, canvas.width, 30); ctx.fillRect(0, canvas.height-30, canvas.width, 30);
            ctx.fillStyle = '#cbd5e1'; ctx.font = 'bold 12px sans-serif'; ctx.fillText(`Thành Phía Trên`, 10, 20); ctx.fillText(`Thành Phía Dưới`, 10, canvas.height - 10);

            platforms.forEach(plat => {
                ctx.fillStyle = envTheme.wall; ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = envTheme.border; ctx.lineWidth = 1.5; ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                ctx.fillStyle = '#cbd5e1'; ctx.font = '11px sans-serif'; ctx.fillText(plat.label, plat.x + 5, plat.y - 5);
            });

            // Nội tạng bảo vệ
            ctx.fillStyle = envTheme.organColor; ctx.fillRect(organBase.x, organBase.y, organBase.w, organBase.h);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
            ctx.save(); ctx.translate(organBase.x + 20, organBase.y + 110); ctx.rotate(-Math.PI/2); ctx.fillText(envTheme.name ? envTheme.name.toUpperCase() : "NỘI TẠNG", 0, 0); ctx.restore();

            // Vật phẩm & Đạn
            mapViruses.forEach(m => { ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill(); });
            mapHeals.forEach(m => { ctx.fillStyle='#34d399'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill(); });
            projectiles.forEach(p => { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); });

            // P1
            if(p1.hp > 0) {
                ctx.fillStyle = p1.color; ctx.fillRect(p1.x, p1.y, p1.width, p1.height);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(p1.x + (p1.vx >= 0 ? 12 : 4), p1.y + 4, 6, 6);
                if(p1.shieldActive) { ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p1.x + p1.width/2, p1.y + p1.height/2, 25, -Math.PI/2, Math.PI/2); ctx.stroke(); }
            }

            // P2
            if(p2.active && p2.hp > 0) {
                ctx.fillStyle = p2.color; ctx.fillRect(p2.x, p2.y, p2.width, p2.height);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(p2.x + (p2.vx >= 0 ? 12 : 4), p2.y + 4, 6, 6);
                if(p2.shieldActive) { ctx.strokeStyle = '#7dd3fc'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p2.x + p2.width/2, p2.y + p2.height/2, 25, -Math.PI/2, Math.PI/2); ctx.stroke(); }
            }

            // Boss
            if(boss.hp > 0) {
                ctx.fillStyle = boss.color; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.radius, 0, Math.PI*2); ctx.fill();
                for(let i=0; i<8; i++) {
                    let a = (i * Math.PI) / 4 + Date.now()/500; ctx.strokeStyle = '#fca5a5'; ctx.lineWidth=2;
                    ctx.beginPath(); ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x + Math.cos(a)*(boss.radius+10), boss.y + Math.sin(a)*(boss.radius+10)); ctx.stroke();
                }
                
                ctx.fillStyle = '#000'; ctx.fillRect(boss.x - 30, boss.y - boss.radius - 22, 60, 6);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(boss.x - 30, boss.y - boss.radius - 22, (boss.hp/boss.maxHp)*60, 6);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.fillText('BOSS UNG THƯ', boss.x, boss.y - boss.radius - 28); ctx.textAlign = 'left';

                if(boss.shieldActive) { ctx.strokeStyle = '#fb7185'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.radius + 15, Math.PI/2, Math.PI*1.5); ctx.stroke(); }
            }

            // Game Over
            if (gameState !== 'playing') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; 
                
                if (gameState === 'win') {
                    let score = Math.max(10000 - Math.floor(elapsedTime * 150), 500);
                    let medal = elapsedTime <= 30 ? 'VÀNG 🥇' : (elapsedTime <= 60 ? 'BẠC 🥈' : 'ĐỒNG 🥉');
                    ctx.fillStyle = '#10b981'; ctx.font = 'bold 36px sans-serif'; ctx.fillText("BẢO VỆ THÀNH CÔNG!", canvas.width/2, 160);
                    ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 22px sans-serif'; ctx.fillText(`Huy chương: ${medal}`, canvas.width/2, 210);
                    ctx.fillStyle = '#cbd5e1'; ctx.font = '18px sans-serif'; ctx.fillText(`Thời gian: ${elapsedTime.toFixed(1)}s - Điểm: ${score}`, canvas.width/2, 240);
                } else {
                    ctx.fillStyle = '#e11d48'; ctx.font = 'bold 36px sans-serif'; ctx.fillText("BOSS ĐÃ PHÁ HỦY CƠ THỂ!", canvas.width/2, 180);
                }
                ctx.font = '14px sans-serif'; ctx.fillStyle='#94a3b8'; ctx.fillText("Bấm vào các nút chọn Hệ Cơ Quan để chơi lại", canvas.width/2, 300);
                ctx.textAlign = 'left';
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        
        setGameMode('pve'); 
        selectOrgan('brain');
        loop();
    </script>
</body>
</html>
