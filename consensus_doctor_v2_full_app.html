*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;--bg2:#080c1a;--bg3:#0d1226;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --cyan:#00e5ff;--cyan2:#00b8cc;--violet:#9c6fff;--violet2:#6b3fd4;
  --green:#00e676;--amber:#ffb74d;--red:#ff5252;--pink:#f48fb1;
  --text:#e8f0f8;--text2:rgba(232,240,248,0.55);--text3:rgba(232,240,248,0.28);
  --font-d:'Syne',sans-serif;--font-m:'JetBrains Mono',monospace;
  --radius:10px;--radius-lg:16px;
}
.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaf0;
  --surface:rgba(0,0,0,0.03);--surface2:rgba(0,0,0,0.06);
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#0d1226;--text2:rgba(13,18,38,0.6);--text3:rgba(13,18,38,0.35);
}
body,#app{min-height:600px;background:var(--bg);color:var(--text);font-family:var(--font-d);font-size:13px;line-height:1.5}
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* Auth screen */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:600px;padding:32px;background:var(--bg)}
.auth-card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px 36px}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--cyan2),var(--violet2));display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.auth-btn{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font-d);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:10px}
.auth-btn:hover{background:var(--surface2);border-color:var(--cyan)}
.auth-btn svg{flex-shrink:0}
.auth-divider{text-align:center;color:var(--text3);font-size:11px;font-family:var(--font-m);letter-spacing:.1em;margin:16px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font-d);font-size:13px;margin-bottom:10px;outline:none}
.auth-input:focus{border-color:var(--cyan)}
.auth-input::placeholder{color:var(--text3)}
.btn-primary{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--cyan2),var(--violet2));color:#fff;font-family:var(--font-d);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}

/* Main app layout */
.app-wrap{display:flex;flex-direction:column;height:600px;overflow:hidden;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);background:rgba(4,6,15,0.9);flex-shrink:0;gap:8px}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan2),var(--violet2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.icon-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--font-m);transition:all .2s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.active{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.3);color:var(--cyan)}

.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;border-right:1px solid var(--border);background:rgba(4,6,15,0.6);display:flex;flex-direction:column;padding:12px 8px;gap:3px;flex-shrink:0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);border:1px solid transparent;transition:all .18s;background:transparent;width:100%;text-align:left;font-family:var(--font-d)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.2);color:var(--cyan)}
.nav-sep{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);padding:10px 10px 4px;margin-top:4px}
.nav-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

.main{flex:1;overflow-y:auto;padding:20px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.card-title{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Tags / chips */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--font-m);letter-spacing:.05em;border:1px solid}
.tag-cyan{background:rgba(0,229,255,.1);color:var(--cyan);border-color:rgba(0,229,255,.2)}
.tag-violet{background:rgba(156,111,255,.1);color:var(--violet);border-color:rgba(156,111,255,.2)}
.tag-green{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.2)}
.tag-amber{background:rgba(255,183,77,.1);color:var(--amber);border-color:rgba(255,183,77,.2)}
.tag-red{background:rgba(255,82,82,.1);color:var(--red);border-color:rgba(255,82,82,.2)}
.tag-pink{background:rgba(244,143,177,.1);color:var(--pink);border-color:rgba(244,143,177,.2)}

/* Upload zone */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--cyan);background:rgba(0,229,255,0.04)}
.upload-zone input{display:none}

/* Patient row */
.patient-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;margin-bottom:6px}
.patient-row:hover{border-color:var(--border2);background:var(--surface2)}
.patient-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* Family tree */
.family-node{display:inline-flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;transition:all .2s;font-size:11px}
.family-node:hover{border-color:var(--cyan)}
.family-node.selected{border-color:var(--cyan);background:rgba(0,229,255,.08)}
.family-node .fn-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-bottom:2px}
.family-line{stroke:var(--border2);stroke-width:1.5;fill:none}

/* Progress bar */
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* Animations */
@keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim{animation:fade-in .35s ease both}

/* Suggestion card */
.suggest-card{background:linear-gradient(135deg,rgba(0,229,255,0.05),rgba(156,111,255,0.05));border:1px solid rgba(0,229,255,0.2);border-radius:12px;padding:14px}

/* Notification dot */
.notif{width:7px;height:7px;border-radius:50%;background:var(--red);position:absolute;top:-1px;right:-1px}

/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Admin table */
.adm-table{width:100%;border-collapse:collapse;font-size:12px}
.adm-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.adm-table td{padding:10px;border-bottom:1px solid var(--border);color:var(--text2)}
.adm-table tr:hover td{background:var(--surface2)}

/* Timeline dot */
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* Modal overlay faux */
.modal-wrap{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;max-width:400px;width:90%}

/* Lang switch */
.lang-btn{padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:10px;font-family:var(--font-m);cursor:pointer;transition:all .2s}
.lang-btn.active{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--cyan)}

/* Status badge */
.status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--font-m)}
.status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.status.online{color:var(--green)}
.status.watch{color:var(--amber)}
.status.critical{color:var(--red)}
</style>

function renderFamilySVG(fam, diseaseColor){
  const genMap = {0:30,1:110,2:190};
  let lines = '';
  let nodes = '';
  const byGen = {};
  fam.forEach(m=>{byGen[m.gen]=byGen[m.gen]||[];byGen[m.gen].push(m);});

  Object.entries(byGen).forEach(([gen,members])=>{
    const y = genMap[gen]||30+gen*80;
    const spacing = 320/(members.length+1);
    members.forEach((m,i)=>{
      m._x = spacing*(i+1);
      m._y = y;
    });
  });

  fam.forEach(m=>{
    if(m.gen>0){
      const prevGen = fam.filter(f=>f.gen===m.gen-1);
      if(prevGen.length){
        const mid = prevGen.reduce((s,f)=>s+f._x,0)/prevGen.length;
        lines+=`<line x1="${mid}" y1="${prevGen[0]._y+28}" x2="${m._x}" y2="${m._y-28}" stroke="${m.disease&&(m.disease.includes('ung thư')||m.disease.includes('Ung thư')||m.disease.includes('NSCLC'))?'rgba(255,82,82,0.3)':'rgba(255,255,255,0.1)'}" stroke-width="1" stroke-dasharray="${m.disease&&(m.disease.includes('ung thư')||m.disease.includes('Ung thư'))?'3,2':'0'}"/>`;
      }
    }
  });

  fam.forEach(m=>{
    const dc = diseaseColor(m.disease);
    const isPatient = m.self;
    nodes+=`
    <g>
      <circle cx="${m._x}" cy="${m._y}" r="20" fill="${dc}22" stroke="${isPatient?'#00e5ff':dc}" stroke-width="${isPatient?2:1}"/>
      ${isPatient?`<circle cx="${m._x}" cy="${m._y}" r="23" fill="none" stroke="rgba(0,229,255,0.3)" stroke-width="1" stroke-dasharray="3,2"/>`:''}
      <text x="${m._x}" y="${m._y+1}" text-anchor="middle" dominant-baseline="central" fill="${dc}" font-size="9" font-weight="700" font-family="Syne">${m.name.slice(-2)}</text>
      <text x="${m._x}" y="${m._y+28}" text-anchor="middle" fill="rgba(232,240,248,0.5)" font-size="8" font-family="Syne">${m.rel}</text>
      <text x="${m._x}" y="${m._y+37}" text-anchor="middle" fill="${dc}" font-size="7" font-family="Syne">${m.disease.length>10?m.disease.slice(0,10)+'…':m.disease}</text>
    </g>`;
  });

  return lines+nodes;
}

      </div>`).join('')}

        Sau khi hoàn thành <b style="color:var(--cyan)">4 bước xét nghiệm</b> trên, kết quả <b style="color:var(--violet)">PET-CT toàn thân</b> sẽ xác định được ổ ung thư nguyên phát với độ chính xác ~97%. Bước 1-3 giúp thu hẹp phạm vi và tiết kiệm chi phí trước khi thực hiện PET-CT.

  </div>`;
}

function loginAsAdmin(){
  currentPage='app';
  currentNav='patients';
  selectedPatient=patients[0].id;
  render();
}
function logout(){currentPage='login';render();}
function goNav(nav){currentNav=nav;render();}
function selectPatient(id,nav){selectedPatient=id;currentNav=nav||currentNav;render();}
function toggleDark(){darkMode=!darkMode;render();}
function setLang(l){lang=l;render();}
function openModal(){showModal=true;render();}
function closeModal(){showModal=false;render();}
function triggerUpload(){document.getElementById('file-input')&&document.getElementById('file-input').click();}
function handleFiles(e){
  uploadedFiles=[...e.target.files];
  render();
  setTimeout(()=>{uploadedFiles=[];render();},5000);
}
function markDone(i){
  hongSuggestions[i].done=!hongSuggestions[i].done;
  render();
}
function addNewPatient(){
  const name=document.getElementById('new-name')?.value;
  if(!name){alert('Vui lòng nhập họ tên bệnh nhân');return;}
  const initials=name.split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
  const colors=['#00e5ff','#9c6fff','#00e676','#f48fb1','#ffb74d','#ff5252'];
  patients.push({
    id:'NEW-'+Date.now().toString().slice(-3),
    name,age:document.getElementById('new-age')?.value||'—',gender:'—',
    diag:document.getElementById('new-diag')?.value||'Chưa chẩn đoán',
    status:'active',avatar:initials,color:colors[Math.floor(Math.random()*colors.length)],
    lastScan:'—',family:[],uploads:[]
  });
  showModal=false;
  render();
}
