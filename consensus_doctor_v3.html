<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consensus Doctor v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;--bg2:#080c1a;--bg3:#0d1226;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --cyan:#00e5ff;--cyan2:#00b8cc;--violet:#9c6fff;--violet2:#6b3fd4;
  --green:#00e676;--amber:#ffb74d;--red:#ff5252;--pink:#f48fb1;
  --text:#e8f0f8;--text2:rgba(232,240,248,0.55);--text3:rgba(232,240,248,0.28);
  --font-d:'Syne',sans-serif;--font-m:'JetBrains Mono',monospace;
  --radius:10px;--radius-lg:16px;
  --sidebar-w:210px;
}
.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaf0;
  --surface:rgba(0,0,0,0.03);--surface2:rgba(0,0,0,0.06);
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.18);
  --text:#0d1226;--text2:rgba(13,18,38,0.6);--text3:rgba(13,18,38,0.35);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-d);font-size:13px;line-height:1.5;transition:background .3s,color .3s}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ===== AUTH ===== */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);overflow-y:auto}
.auth-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 32px}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--cyan2),var(--violet2));display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.auth-btn{width:100%;padding:11px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font-d);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;margin-bottom:9px}
.auth-btn:hover{background:var(--surface2);border-color:var(--cyan)}
.auth-divider{text-align:center;color:var(--text3);font-size:11px;font-family:var(--font-m);letter-spacing:.08em;margin:14px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-input{width:100%;padding:10px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font-d);font-size:13px;margin-bottom:9px;outline:none;transition:border .2s}
.auth-input:focus{border-color:var(--cyan)}
.auth-input::placeholder{color:var(--text3)}
.btn-primary{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--cyan2),var(--violet2));color:#fff;font-family:var(--font-d);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.lang-btn{padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:10px;font-family:var(--font-m);cursor:pointer;transition:all .2s}
.lang-btn.active{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--cyan)}

/* ===== MAIN APP ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;border-bottom:1px solid var(--border);background:rgba(4,6,15,0.92);backdrop-filter:blur(8px);flex-shrink:0;gap:8px;z-index:100}
.light .topbar{background:rgba(240,242,245,0.95)}
.topbar-logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--font-m);transition:all .2s;display:flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.active{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.3);color:var(--cyan)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan2),var(--violet2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border2)}
.avatar img{width:100%;height:100%;object-fit:cover}

.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);background:rgba(4,6,15,0.6);display:flex;flex-direction:column;padding:10px 7px;gap:2px;flex-shrink:0;overflow-y:auto;transition:background .3s}
.light .sidebar{background:rgba(240,242,245,0.8)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);border:1px solid transparent;transition:all .18s;background:transparent;width:100%;text-align:left;font-family:var(--font-d)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.2);color:var(--cyan)}
.nav-sep{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);padding:8px 10px 3px;margin-top:2px}
.sidebar-user{padding:10px 8px;border-top:1px solid var(--border);margin-top:auto;display:flex;align-items:center;gap:8px}

.main{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}
.light .main{background:var(--bg)}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.card-title{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);margin-bottom:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--font-m);border:1px solid}
.tag-cyan{background:rgba(0,229,255,.1);color:var(--cyan);border-color:rgba(0,229,255,.2)}
.tag-violet{background:rgba(156,111,255,.1);color:var(--violet);border-color:rgba(156,111,255,.2)}
.tag-green{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.2)}
.tag-amber{background:rgba(255,183,77,.1);color:var(--amber);border-color:rgba(255,183,77,.2)}
.tag-red{background:rgba(255,82,82,.1);color:var(--red);border-color:rgba(255,82,82,.2)}
.tag-pink{background:rgba(244,143,177,.1);color:var(--pink);border-color:rgba(244,143,177,.2)}

/* ===== UPLOAD ===== */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--cyan);background:rgba(0,229,255,0.04)}
.upload-zone input{display:none}

/* ===== PATIENTS ===== */
.patient-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;margin-bottom:6px}
.patient-row:hover{border-color:var(--border2);background:var(--surface2)}

/* ===== SUGGEST ===== */
.suggest-card{background:linear-gradient(135deg,rgba(0,229,255,.05),rgba(156,111,255,.05));border:1px solid rgba(0,229,255,.2);border-radius:12px;padding:13px}

/* ===== FAMILY ===== */
.family-tree-svg{overflow:visible}

/* ===== ADMIN TABLE ===== */
.adm-table{width:100%;border-collapse:collapse;font-size:12px}
.adm-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
.adm-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.adm-table tr:hover td{background:var(--surface2)}

/* ===== MODAL ===== */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:300}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;max-width:440px;width:92%;max-height:90vh;overflow-y:auto}

/* ===== PROGRESS ===== */
.prog-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* ===== TIMELINE ===== */
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* ===== STATUS ===== */
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--font-m)}
.status-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ===== ANIMATIONS ===== */
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim{animation:fade-in .3s ease both}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ===== NOTIFICATION ===== */
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--red);position:absolute;top:-1px;right:-1px}

/* ===== STEP TIMELINE ===== */
.step-connector{width:2px;background:var(--border);flex:1;min-height:16px;margin:0 auto}

/* ===== FILE PREVIEW ===== */
.file-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.file-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* ===== DARK/LIGHT TOGGLE ===== */
.toggle-wrap{display:flex;align-items:center;gap:6px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:rgba(0,229,255,.2)}
.toggle::after{content:'';width:14px;height:14px;border-radius:50%;background:var(--text3);position:absolute;top:2px;left:2px;transition:left .2s,background .2s}
.toggle.on::after{left:18px;background:var(--cyan)}

/* ===== PAGINATION ===== */
.page-nav{display:flex;justify-content:center;gap:6px;margin-top:12px}
.page-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font-m);display:flex;align-items:center;justify-content:center;transition:all .18s}
.page-btn.active,.page-btn:hover{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--cyan)}

/* ===== SEARCH ===== */
.search-box{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font-d);font-size:12px;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--cyan)}
.search-box::placeholder{color:var(--text3)}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .sidebar{display:none}
  .grid2,.grid3{grid-template-columns:1fr}
}
</style>
</head>

// LOCAL STORAGE PER USER
// ============================================================
function lsKey(key){ return `cd3_${state.user?.email||'guest'}_${key}`; }
function loadUserData(){
  const raw = localStorage.getItem(lsKey('patients'));
  if(raw){ try{ state.patients=JSON.parse(raw); }catch(e){ state.patients=seedPatients(state.user.email); } }
  else{ state.patients=seedPatients(state.user.email); saveUserData(); }
  const hongSug = localStorage.getItem(lsKey('hongSug'));
  if(hongSug){ try{ const d=JSON.parse(hongSug); hongSuggestions.forEach((s,i)=>{if(d[i]!=null)s.done=d[i];}); }catch(e){} }
}
function saveUserData(){
  localStorage.setItem(lsKey('patients'), JSON.stringify(state.patients));
}
function saveHongSug(){
  localStorage.setItem(lsKey('hongSug'), JSON.stringify(hongSuggestions.map(s=>s.done)));
}

// ACTIVITY LOG (admin)
// ============================================================
let activityLog = JSON.parse(localStorage.getItem('cd3_activity')||'[]');
function logActivity(action, user){
  const entry = {time:new Date().toLocaleTimeString('vi',{hour:'2-digit',minute:'2-digit'}), user:user||state.user?.name||'?', action, ts:Date.now()};
  activityLog.unshift(entry);
  if(activityLog.length>50) activityLog=activityLog.slice(0,50);
  localStorage.setItem('cd3_activity', JSON.stringify(activityLog));
}

function renderFamilySVG(fam,dc){
  const byGen = {};
  fam.forEach(m=>{(byGen[m.gen]=byGen[m.gen]||[]).push(m);});
  const gens = Object.keys(byGen).map(Number).sort();
  const W=320, colH=80;
  gens.forEach(gen=>{
    const members=byGen[gen];
    members.forEach((m,i)=>{
      m._x = W/(members.length+1)*(i+1);
      m._y = 40+gen*colH;
    });
  });
  let lines='',nodes='';
  fam.forEach(m=>{
    if(m.gen>0){
      const prev=fam.filter(f=>f.gen===m.gen-1);
      if(prev.length){
        const cx=prev.reduce((s,f)=>s+f._x,0)/prev.length;
        const cy=prev[0]._y;
        const isCancer=/(ung thư|cancer|nsclc|di căn)/i.test(m.disease||'');
        lines+=`<line x1="${cx}" y1="${cy+22}" x2="${m._x}" y2="${m._y-22}" stroke="${isCancer?'rgba(255,82,82,0.4)':'rgba(255,255,255,0.1)'}" stroke-width="1.5" stroke-dasharray="${isCancer?'4,2':'0'}"/>`;
      }
    }
  });
  fam.forEach(m=>{
    const c=dc(m.disease);
    const isSelf=m.self;
    const shortName=(m.name||'').trim().split(' ').filter(Boolean).slice(-1)[0]?.slice(0,2)||'?';
    nodes+=`
    <g>
      ${isSelf?`<circle cx="${m._x}" cy="${m._y}" r="24" fill="none" stroke="rgba(0,229,255,0.25)" stroke-width="1.5" stroke-dasharray="4,2"/>`:''}
      <circle cx="${m._x}" cy="${m._y}" r="20" fill="${c}18" stroke="${isSelf?'#00e5ff':c}" stroke-width="${isSelf?2:1.5}"/>
      <text x="${m._x}" y="${m._y}" text-anchor="middle" dominant-baseline="central" fill="${c}" font-size="9" font-weight="700" font-family="Syne">${shortName}</text>
      <text x="${m._x}" y="${m._y+28}" text-anchor="middle" fill="rgba(232,240,248,0.45)" font-size="8" font-family="Syne">${m.rel||''}</text>
      <text x="${m._x}" y="${m._y+37}" text-anchor="middle" fill="${c}" font-size="7" font-family="Syne">${(m.disease||'').slice(0,12)}${(m.disease||'').length>12?'…':''}</text>
    </g>`;
  });
  return lines+nodes;
}

  const main = document.getElementById('main-content');
  if(main){
    main.innerHTML = renderPage();
    main.classList.remove('anim');
    void main.offsetWidth;
    main.classList.add('anim');
    bindPageEvents();
  } else {

  // Re-render sidebar to update active state
  const sidebar = document.querySelector('.sidebar');
  if(sidebar) sidebar.innerHTML = renderSidebar().replace('<aside class="sidebar">','').replace('</aside>','');
  const newSidebar = renderSidebar();
  if(sidebar) sidebar.outerHTML = newSidebar;
  render();
}

function addNewPatient(){
  const name = document.getElementById('m-name')?.value?.trim();
  if(!name){ alert(state.lang==='vi'?'Vui lòng nhập họ tên':'Please enter name'); return; }
  const age = document.getElementById('m-age')?.value;
  const gender = document.getElementById('m-gender')?.value||'O';
  const diag = document.getElementById('m-diag')?.value||'Chưa chẩn đoán';
  const status = document.getElementById('m-status')?.value||'active';
  const relPat = document.getElementById('m-rel-pat')?.value;
  const relType = document.getElementById('m-rel-type')?.value;
  const colors = ['#00e5ff','#9c6fff','#00e676','#f48fb1','#ffb74d'];
  const initials = name.trim().split(' ').filter(Boolean).slice(-2).map(w=>w[0]).join('').toUpperCase();
  const newPat = {
    id:'PAT-'+Date.now().toString().slice(-4),
    name, age:age||'—', gender, diag, status,
    avatar:initials,
    color:colors[Math.floor(Math.random()*colors.length)],
    lastScan:'—', ownerId:state.user?.email,
    family:[], uploads:[], timeline:[],
  };
  state.patients.push(newPat);
  // If linked to existing patient, add cross-reference
  if(relPat && relType){
    const linked = state.patients.find(p=>p.id===relPat);
    if(linked){
      linked.family = linked.family||[];
      linked.family.push({
        id:'fm-'+Date.now(),name,rel:relType,age:parseInt(age)||0,
        disease:diag,gen:1
      });
    }
  }
  saveUserData();
  logActivity(state.lang==='vi'?`Thêm bệnh nhân mới: ${name}`:`Added new patient: ${name}`);
  state.selectedPid = newPat.id;
  state.modal = null;
  state.nav = 'patients';
  render();
}

function addRelative(){
  const name = document.getElementById('r-name')?.value?.trim();
  const rel = document.getElementById('r-rel')?.value;
  if(!name||!rel){ alert(state.lang==='vi'?'Vui lòng nhập họ tên và quan hệ':'Please enter name and relation'); return; }
  const age = parseInt(document.getElementById('r-age')?.value)||0;
  const gen = parseInt(document.getElementById('r-gen')?.value)||1;
  const disease = document.getElementById('r-disease')?.value||'Khỏe mạnh';
  const p = state.patients.find(x=>x.id===state.selectedPid)||state.patients[0];
  if(!p) return;
  p.family = p.family||[];
  p.family.push({id:'fm-'+Date.now(),name,rel,age,disease,gen});
  saveUserData();
  logActivity(state.lang==='vi'?`Thêm người thân ${name} cho ${p.name}`:`Added relative ${name} to ${p.name}`);
  state.modal = null;
  render();
}

function addFilesToPatient(files){
  const p = state.patients.find(x=>x.id===state.selectedPid)||state.patients[0];
  if(!p) return;
  state.uploadedNow = files;
  const typeMap = {'.dcm':'DICOM','.pdf':'PDF','.jpg':'Image','.jpeg':'Image','.png':'Image','.zip':'ZIP'};
  files.forEach(f=>{
    const ext = '.'+f.name.split('.').pop().toLowerCase();
    const type = typeMap[ext]||'Other';
    const record = {
      id:'up-'+Date.now()+Math.random().toString(36).slice(2,5),
      name:f.name, type, size:`${(f.size/1024/1024).toFixed(1)} MB`,
      date:new Date().toISOString().split('T')[0],
      status:'processing', notes:''
    };
    p.uploads = p.uploads||[];
    p.uploads.unshift(record);
    // Simulate analysis
    setTimeout(()=>{
      record.status = 'analyzed';
      record.notes = state.lang==='vi'?'AI phân tích hoàn tất':'AI analysis complete';
      saveUserData();
    }, 3000);
  });
  p.lastScan = new Date().toISOString().split('T')[0];
  saveUserData();
  logActivity(state.lang==='vi'?`Upload ${files.length} file(s) cho ${p.name}`:`Uploaded ${files.length} file(s) for ${p.name}`);
  render();
  setTimeout(()=>{ state.uploadedNow=[]; render(); }, 4000);
}

function viewFile(fileId, patId){
  const p = state.patients.find(x=>x.id===patId);
  const file = p?.uploads?.find(f=>f.id===fileId);
  if(file){ openModal('viewFile',{file,patName:p?.name}); }
}

function deleteFile(fileId, patId){
  const p = state.patients.find(x=>x.id===patId);
  if(!p) return;
  if(!confirm(state.lang==='vi'?`Xoá file này?`:`Delete this file?`)) return;
  const fname = p.uploads?.find(f=>f.id===fileId)?.name||'';
  p.uploads = (p.uploads||[]).filter(f=>f.id!==fileId);
  saveUserData();
  logActivity(state.lang==='vi'?`Xoá file ${fname} của ${p.name}`:`Deleted file ${fname} from ${p.name}`,'type:delete');
  render();
}

function markDone(i){
  hongSuggestions[i].done = !hongSuggestions[i].done;
  saveHongSug();
  logActivity(state.lang==='vi'?`${hongSuggestions[i].done?'Đánh dấu hoàn thành':'Bỏ đánh dấu'}: ${hongSuggestions[i].title}`:`${hongSuggestions[i].done?'Marked done':'Unmarked'}: ${hongSuggestions[i].title_en}`);
  const main = document.getElementById('main-content');
  if(main){ main.innerHTML = renderPage(); bindPageEvents(); }
}

function saveProfile(){
  const name = document.getElementById('ep-name')?.value?.trim();
  const specialty = document.getElementById('ep-specialty')?.value?.trim();
  if(name && state.user) {
    state.user.name = name;
    state.user.specialty = specialty;
    // Update avatar
    state.user.avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=00b8cc&color=fff&size=80&bold=true&rounded=true`;
  }
  state.modal = null;
  render();
}

// ============================================================
// BIND EVENTS
// ============================================================
function bindAll(){
  // keyboard: Enter on auth
  const authPwd = document.getElementById('auth-pwd');
  if(authPwd) authPwd.onkeydown = e=>{ if(e.key==='Enter') loginEmail(); };
  const authEmail = document.getElementById('auth-email');
  if(authEmail) authEmail.onkeydown = e=>{ if(e.key==='Enter') document.getElementById('auth-pwd')?.focus(); };
  bindPageEvents();
}

function bindPageEvents(){
  const si = document.getElementById('file-input');
  if(si) si.onchange = handleFiles;
  const dz = document.getElementById('drop-zone');
  if(dz){
    dz.ondragover = e=>{ e.preventDefault(); dz.classList.add('drag'); };
    dz.ondragleave = ()=>{ dz.classList.remove('drag'); };
    dz.ondrop = handleDrop;
    dz.onclick = ()=>{ document.getElementById('file-input')?.click(); };
  }
}

// ============================================================
// INIT
// ============================================================
render();
</script>
